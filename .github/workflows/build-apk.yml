name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -qo gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk
          yes | cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses 2>/dev/null || true
          cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Generate Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Agent学习-APK
          path: android/app/build/outputs/apk/release/
