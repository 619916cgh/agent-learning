<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 — AI Agent 学习指南</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<style>
  .admin-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .admin-header-section {
    text-align: center;
    padding: 60px 0 40px;
  }
  .admin-header-section h1 {
    font-size: 2.4rem;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .admin-header-section p {
    color: var(--text-muted);
    font-size: 15px;
  }
  .admin-panel-wrapper {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 32px;
    margin-bottom: 48px;
  }
  @media (max-width: 640px) {
    .admin-header-section h1 { font-size: 1.6rem; }
    .admin-header-section { padding: 40px 0 24px; }
    .admin-panel-wrapper { padding: 16px; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div class="top-bar-left">
    <div class="logo-icon">A</div>
    <span class="logo-text">AI Agent 学习指南</span>
  </div>
  <div class="top-bar-right">
    <button class="btn btn-sm" id="authBtn" style="margin-right:8px;">👤 登录</button>
    <button class="btn btn-icon" id="themeToggle" title="切换主题">🌙</button>
  </div>
</header>

<!-- Main Content -->
<main class="main-content">
  <div class="admin-container">
    <div class="admin-header-section">
      <h1>管理员面板</h1>
      <p>查看所有用户的学习数据与进度</p>
    </div>
    <div class="admin-panel-wrapper" id="adminPanelContainer">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">
        加载中...
      </div>
    </div>
  </div>
</main>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/progress-tracker.js"></script>
<script src="js/notes-system.js"></script>
<script>
(function() {
  'use strict';
  function render() {
    var container = document.getElementById('adminPanelContainer');
    if (container && window.AgentLearn && window.AgentLearn.Auth) {
      AgentLearn.Auth.renderAdminPanel(container);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    // 延迟一小段时间确保 auth.js 完成初始化
    setTimeout(render, 100);
  }
})();
</script>

</body>
</html>
